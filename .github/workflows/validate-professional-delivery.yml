name: Validate Professional Delivery

on:
  push:
    branches: [codex/professional-ui-refresh]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check JavaScript and delivery anchors
        run: |
          node --check frontend/js/salesDelivery.js
          node --check frontend/pages/salesOrdersProfessional.js
          grep -q 'sales-delivery.css?v=delivery1' frontend/index.html
          grep -q 'deliverSalesOrder' frontend/js/salesDelivery.js
          grep -q 'Confirm Delivered & Deduct Inventory' frontend/js/salesDelivery.js
          grep -q 'role === "MANAGER"' frontend/pages/salesOrdersProfessional.js
