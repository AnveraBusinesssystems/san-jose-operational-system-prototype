name: Sync Professional Code.gs
on:
  push:
    branches: [codex/professional-ui-refresh]
permissions:
  contents: write
jobs:
  sync:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - run: |
          git fetch origin main
          git checkout origin/main -- apps-script/Code.gs
          node --check <(cp apps-script/Code.gs /tmp/Code.js; cat /tmp/Code.js)
        shell: bash
      - run: